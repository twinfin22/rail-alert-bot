name: Maintenance
on:
  workflow_dispatch:
    inputs:
      environment: { description: 'staging only until production cutover is approved', required: true, type: choice, options: [staging] }
jobs:
  maintain:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - run: curl --fail --silent --show-error -X POST "$RAIL_WORKER_URL/internal/maintenance" -H "Authorization: Bearer $INTERNAL_API_SECRET"
        env: { RAIL_WORKER_URL: ${{ secrets.RAIL_WORKER_URL }}, INTERNAL_API_SECRET: ${{ secrets.INTERNAL_API_SECRET }} }
