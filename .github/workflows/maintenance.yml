name: Maintenance
"on":
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options: [staging, production]
  schedule:
    - cron: "*/5 * * * *"
jobs:
  maintain:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'production' }}
    steps:
      - run: |
          curl --fail --silent --show-error -X POST "$RAIL_WORKER_URL/internal/maintenance" \
            -H "Authorization: Bearer $INTERNAL_API_SECRET"
        env:
          RAIL_WORKER_URL: ${{ secrets.RAIL_WORKER_URL }}
          INTERNAL_API_SECRET: ${{ secrets.INTERNAL_API_SECRET }}
