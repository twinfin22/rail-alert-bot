name: SRT poll
on:
  workflow_dispatch:
    inputs:
      environment: { description: 'staging only until production cutover is approved', required: true, type: choice, options: [staging] }
concurrency: { group: rail-alert-srt-poll, cancel-in-progress: false }
jobs:
  poll:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run poll srt
        env: { RAIL_WORKER_URL: ${{ secrets.RAIL_WORKER_URL }}, INTERNAL_API_SECRET: ${{ secrets.INTERNAL_API_SECRET }} }
