name: Bus poll
on: { schedule: [{ cron: '*/5 * * * *' }], workflow_dispatch: {} }
concurrency: { group: rail-alert-bus-poll, cancel-in-progress: false }
jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run poll bus
        env: { RAIL_WORKER_URL: ${{ secrets.RAIL_WORKER_URL }}, INTERNAL_API_SECRET: ${{ secrets.INTERNAL_API_SECRET }} }
