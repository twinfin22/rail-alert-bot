name: Staging health

on: [workflow_dispatch]

jobs:
  health:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - run: curl --fail --silent --show-error "$RAIL_WORKER_URL/internal/health" -H "Authorization: Bearer $INTERNAL_API_SECRET"
        env:
          RAIL_WORKER_URL: ${{ secrets.RAIL_WORKER_URL }}
          INTERNAL_API_SECRET: ${{ secrets.INTERNAL_API_SECRET }}
