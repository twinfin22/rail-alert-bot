name: Bootstrap production admin

"on":
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: |
          curl --fail --silent --show-error -X POST "$RAIL_WORKER_URL/internal/admin/bootstrap" \
            -H "Authorization: Bearer $INTERNAL_API_SECRET"
        env:
          RAIL_WORKER_URL: ${{ secrets.RAIL_WORKER_URL }}
          INTERNAL_API_SECRET: ${{ secrets.INTERNAL_API_SECRET }}
