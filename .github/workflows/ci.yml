name: CI
"on": [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: bun install --frozen-lockfile
      - run: python -m pip install --require-hashes -r requirements-ktx.txt
      - run: bun test
      - run: bun run test:ktx
      - run: bun run typecheck
      - run: bun run check:forbidden
      - run: bun run build

  staging-health:
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - run: |
          curl --fail --silent --show-error "$RAIL_WORKER_URL/internal/health" \
            -H "Authorization: Bearer $INTERNAL_API_SECRET"
        env:
          RAIL_WORKER_URL: ${{ secrets.RAIL_WORKER_URL }}
          INTERNAL_API_SECRET: ${{ secrets.INTERNAL_API_SECRET }}
