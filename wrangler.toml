name = "rail-alert-bot"
main = "worker/index.ts"
compatibility_date = "2026-07-13"
keep_vars = true

[vars]
RAIL_TELEGRAM_USERNAME = "srt_suseo_alert_bot"
WEBHOOK_REGISTRATION_ENABLED = "true"

[triggers]
crons = ["*/5 * * * *"]

[secrets]
required = ["BUS_TELEGRAM_TOKEN", "RAIL_TELEGRAM_TOKEN", "BUS_WEBHOOK_SECRET", "RAIL_WEBHOOK_SECRET", "INTERNAL_API_SECRET"]

[[d1_databases]]
binding = "DB"
database_name = "rail-alert-bot-db"
database_id = "553c6aa3-fd72-41df-b4d4-d862e6240a50"
migrations_dir = "migrations"

[env.staging]
name = "rail-alert-bot-staging"

[env.staging.secrets]
required = ["BUS_TELEGRAM_TOKEN", "RAIL_TELEGRAM_TOKEN", "BUS_WEBHOOK_SECRET", "RAIL_WEBHOOK_SECRET", "INTERNAL_API_SECRET"]

[env.staging.vars]
RAIL_TELEGRAM_USERNAME = "srt_suseo_alert_bot"
WEBHOOK_REGISTRATION_ENABLED = "false"

[env.staging.triggers]
crons = []

[[env.staging.d1_databases]]
binding = "DB"
database_name = "rail-alert-bot-staging-db"
database_id = "fd8c7314-410b-4faf-93c8-2c5f7d6ea6d5"
migrations_dir = "migrations"
